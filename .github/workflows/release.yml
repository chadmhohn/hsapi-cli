name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Test
        run: npm test

      - name: Check Cloudflare OAuth Worker
        working-directory: cloudflare/hsapi-oauth-broker
        run: |
          npm ci
          npm run check

      - name: Stamp version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VERSION" --no-git-tag-version
          echo "TARBALL=hsapi-cli-$TAG_VERSION.tgz" >> "$GITHUB_ENV"

      - name: Pack
        run: npm pack

      - name: Create GitHub Release with tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$TARBALL" \
            --title "hsapi-cli $GITHUB_REF_NAME" \
            --generate-notes
